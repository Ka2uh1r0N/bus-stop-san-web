<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>リッチメニュー</title>
  <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 2500px;
      height: 1686px;
      overflow: hidden;
      font-family: "Kosugi Maru", "Hiragino Sans", sans-serif;
    }

    .menu {
      width: 2500px;
      height: 1686px;
      display: grid;
      grid-template-rows: 843px 843px;
    }

    .cell-a {
      background: linear-gradient(120deg, #0d3f7a 0%, #1a5fa8 40%, #4a9de0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 100px;
      border-bottom: 6px solid rgba(255,255,255,0.25);
      position: relative;
      overflow: hidden;
    }
    .cell-a::before {
      content: "";
      position: absolute;
      width: 900px; height: 900px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      border-radius: 50%;
      top: -300px; right: 300px;
    }
    .cell-a::after {
      content: "";
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 70%);
      border-radius: 50%;
      bottom: -200px; left: 200px;
    }

    .chara-wrap {
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }
    .chara-wrap img {
      width: 600px;
      height: 600px;
      border-radius: 50%;
      border: 10px solid rgba(255,255,255,0.35);
      box-shadow: 0 20px 80px rgba(0,0,0,0.35);
    }

    .cell-a-text {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .cell-a-text .sub {
      font-size: 56px;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.12em;
    }
    .cell-a-text .main {
      font-size: 148px;
      color: white;
      letter-spacing: 0.06em;
      text-shadow: 0 6px 30px rgba(0,0,0,0.25);
      line-height: 1.05;
    }
    .cell-a-text .hint {
      font-size: 50px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.06em;
    }

    .row-bottom {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      background: #EAF3FC;
    }

    .cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      border-right: 4px solid #C8DFF5;
    }
    .cell:last-child { border-right: none; }

    .cell-icon {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 120px;
      box-shadow: 0 10px 30px rgba(43,108,176,0.15);
      line-height: 1;
    }

    .cell .label {
      font-size: 86px;
      color: #2B6CB0;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="menu">
    <div class="cell-a">
      <div class="chara-wrap">
        <img src="chara.png" alt="バス停さん">
      </div>
      <div class="cell-a-text">
        <div class="sub">📍 タップして</div>
        <div class="main">現在地を送信</div>
        <div class="hint">近くのバス停をすぐにお知らせします</div>
      </div>
    </div>

    <div class="row-bottom">
      <div class="cell">
        <div class="cell-icon">❓</div>
        <div class="label">使い方</div>
      </div>
      <div class="cell">
        <div class="cell-icon">🔗</div>
        <div class="label">友だちに教える</div>
      </div>
      <div class="cell">
        <div class="cell-icon">📢</div>
        <div class="label">声を届ける</div>
      </div>
    </div>
  </div>
</body>
</html>
